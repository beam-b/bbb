<script>
    let audioStarted = false;
    const legendText = "ปลาหมอปากดี สุดท้ายก็ตายเพราะปากตัวเอง"; // ตัดให้สั้นสุดๆ

    function initAudio() { if (!audioStarted) { document.getElementById("bgSound").play(); audioStarted = true; } }

    function exitSystem() { alert("งั้นก็ไม่ต้องเอา!"); window.location.href = "https://www.google.com"; }

    function toStep2() {
        document.getElementById("bgSound").pause();
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        const narrator = document.getElementById('legendNarrator');
        narrator.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(legendText)}&tl=th&client=tw-ob`;
        narrator.play();

        // --- จุดที่แก้ไข: ปรับให้รอแค่ 3 วินาทีปุ่มก็ขึ้นเลย ---
        setTimeout(unlockNextButton, 3000); 
    }

    function unlockNextButton() {
        const btn = document.getElementById('nextBtn');
        btn.disabled = false;
        btn.style.background = "#0f0";
        btn.style.color = "#000";
        document.getElementById('narratingIndicator').innerText = "● บทเรียนพร้อมแล้ว...";
    }

    function toStep3() {
        document.getElementById("bgSound").play();
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function verifyRepentance() {
        const text = document.getElementById('userInput').value;
        const count = (text.match(/ผมขอโทษที่ปากดี/g) || []).length;
        if (count >= 5) {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('reward').classList.remove('hidden');
            document.getElementById("bgSound").pause();
        } else {
            alert("พิมพ์มาแค่ " + count + " รอบเอง! พิมพ์ให้ครบ 5!");
        }
    }
</script>
